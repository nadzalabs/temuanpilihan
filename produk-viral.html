<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔥 Produk Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:
radial-gradient(circle at top right,
rgba(255,107,0,.25),
transparent 250px),

radial-gradient(circle at bottom left,
rgba(255,140,66,.18),
transparent 250px),

linear-gradient(
180deg,
#ff6b00 0%,
#ff8c42 18%,
#f8f5f0 45%,
#f8f5f0 100%
);

min-height:100vh;
padding:20px;

animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.container{
max-width:500px;
margin:auto;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:15px;
}

.header{
background:rgba(255,255,255,.92);

backdrop-filter:blur(12px);

padding:28px;

border-radius:24px;

text-align:center;

margin-bottom:22px;

box-shadow:
0 15px 35px rgba(0,0,0,.08);
}

.header h1{
font-size:32px;
color:#222;
margin-bottom:8px;
}

.header p{
color:#666;
line-height:1.5;
}

.product-card{
display:flex;
justify-content:space-between;
align-items:center;

background:white;

padding:18px 20px;

margin-bottom:12px;

border-radius:18px;

text-decoration:none;

color:#222;

font-weight:600;

box-shadow:
0 8px 20px rgba(0,0,0,.06);

transition:.25s;
}

.product-card:hover{
transform:
translateY(-3px)
scale(1.01);

box-shadow:
0 15px 30px rgba(0,0,0,.12);
}

.product-name{
font-size:16px;
}

.arrow{
font-size:22px;
font-weight:bold;
color:#ff6b00;
}

.footer{
text-align:center;
margin-top:25px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">
← Kembali
</a>

<div class="header">
<h1>🔥 Produk Viral</h1>
<p>
Temukan produk viral pilihan terbaik.<br>
Klik nomor produk sesuai yang disebut di video.
</p>
</div>

<a href="https://shopee.co.id/" target="_blank" class="product-card">
<span class="product-name">No.1 - Lampu Tidur Estetik</span>
<span class="arrow">›</span>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product-card">
<span class="product-name">No.2 - Tumbler Premium</span>
<span class="arrow">›</span>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product-card">
<span class="product-name">No.3 - Rak Serbaguna Viral</span>
<span class="arrow">›</span>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product-card">
<span class="product-name">No.4 - Pengharum Mobil</span>
<span class="arrow">›</span>
</a>

<a href="https://shopee.co.id/" target="_blank" class="product-card">
<span class="product-name">No.5 - Organizer Multifungsi</span>
<span class="arrow">›</span>
</a>

<div class="footer">
Temuan Pilihan © 2026
</div>

</div>

</body>
</html>
